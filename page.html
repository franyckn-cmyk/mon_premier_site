<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma structure</title>
</head>

<style>

    *{

        margin: 0;
        padding: 0;

    }

    body{

        margin: 0 auto;
    }

    header{

        background-color: aquamarine;
        height: 100px;
        width: 80%;
        text-align: center;
        padding: 20px;
        margin: 10px auto;
        border-radius: 20px;

    }
    
    nav{

        background-color: rgb(194, 181, 5);
        height: 100px;
        width: 80%;
        text-align: center;
        margin: 10px auto;
        border-radius: 20px;

    }

    
    main{

        background-color: rgb(233, 211, 84);
        height: 600px;
        width: 80%;  
        text-align: center;
        margin: 10px auto;
        border-radius: 20px; 
        position: flex;
        justify-self: space-between;
        height: 90%;
        flex-direction: row;


    }

    
    section{

        background-color: rgb(225, 225, 71);
        height: 100px;
        width: 80%;
        text-align: center;
        margin: 10px auto;
        border-radius: 20px;

    }
    
    
    aside{

        background-color: rgb(255, 0, 17);
        height: 100px;
        width: 80%;
        text-align: center;
        margin: 10px auto;
        border-radius: 20px;

    }
    
    footer{

        background-color: rgb(255, 0, 17);
        height: 100px;
        width: 80%;
        text-align: center;
        margin:  10px auto;
        border-radius: 20px;


    }


</style>


<body>
    <header>
        <h1> header </h1>
    </header>

<nav>
    
<h1> nav </h1>
</nav>

<main>

<section>  <h1> main </h1> </section>
<aside> <h1> aside </h1> </aside>

</main>


</body>

<footer>
<h1> footer </h1>
</footer>


</html>
