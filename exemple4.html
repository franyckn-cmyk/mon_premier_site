<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - MonSite</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    header {
      background-color: #222;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 40px;
      position: fixed;
      width: 100%;
      top: 0;
      z-index: 1000;
    }

    header .logo {
      font-size: 1.5em;
      font-weight: bold;
    }

    header nav ul {
      list-style: none;
      display: flex;
      gap: 20px;
      margin: 0;
      padding: 0;
    }

    header nav ul li a {
      color: white;
      text-decoration: none;
      font-weight: 500;
    }

    header nav ul li a:hover {
      color: #ff9800;
    }

    .contact {
      padding: 120px 40px 40px; /* espace pour compenser le header fixe */
      max-width: 600px;
      margin: auto;
    }

    .contact h1 {
      text-align: center;
      font-size: 2.5em;
      margin-bottom: 20px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    label {
      font-weight: bold;
      margin-bottom: 5px;
    }

    input, textarea, select {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 1em;
    }

    textarea {
      resize: vertical;
      min-height: 120px;
    }

    .checkbox-group, .radio-group {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    button {
      background-color: #ff9800;
      color: white;
      padding: 12px;
      border: none;
      border-radius: 5px;
      font-size: 1em;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background-color: #e68900;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="logo">Franyck Shop</div>
    <nav>
      <ul>
        <li><a href="http://127.0.0.1:5500/exemple.html">Accueil</a></li>
        <li><a href="exemple3.html">Service</a></li>
         <li><a href="http://127.0.0.1:5500/exemple2.html">À propos</a></li>
        <li><a href="http://127.0.0.1:5500/exemple4.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <!-- Section Contact -->
  <section class="contact">
    <h1>Contactez-nous</h1>
    <form action="#" method="post">
      <!-- Nom -->
      <div>
        <label for="name">Nom complet :</label>
        <input type="text" id="name" name="name" placeholder="Votre nom" required>
      </div>

      <!-- Email -->
      <div>
        <label for="email">Adresse email :</label>
        <input type="email" id="email" name="email" placeholder="exemple@mail.com" required>
