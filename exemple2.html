<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>À propos - MonSite</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    header {
      background-color: #222;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 40px;
      position: fixed;
      width: 100%;
      top: 0;
      z-index: 1000;
    }

    header .logo {
      font-size: 1.5em;
      font-weight: bold;
    }

    header nav ul {
      list-style: none;
      display: flex;
      gap: 20px;
      margin: 0;
      padding: 0;
    }

    header nav ul li a {
      color: white;
      text-decoration: none;
      font-weight: 500;
    }

    header nav ul li a:hover {
      color: #ff9800;
    }

    .about {
      padding: 120px 40px 40px; /* espace pour compenser le header fixe */
      text-align: center;
    }

    .about h1 {
      font-size: 2.5em;
      margin-bottom: 20px;
    }

    .about p {
      font-size: 1.2em;
      margin-bottom: 40px;
    }

    .team {
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
    }

    .member {
      width: 250px;
      text-align: center;
    }

    .member img {
      width: 100%;
      border-radius: 50%;
      margin-bottom: 15px;
    }

    .member h3 {
      margin: 10px 0 5px;
    }

    .member p {
      color: #555;
    }
  </style>
</head>
<body>

  
  <header>
    <div class="logo">Franyck Shop</div>
    <nav>
      <ul>
         <li><a href="http://127.0.0.1:5500/exemple.html">Accueil</a></li>
        <li><a href="exemple3.html">Service</a></li>
         <li><a href="http://127.0.0.1:5500/exemple2.html">À propos</a></li>
        <li><a href="http://127.0.0.1:5500/exemple4.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  
  <section class="about">
    <h1>À propos de nous</h1>
    <p>Nous sommes une pétite épicerie de cartier qui veux donner le méilleur à leurs clients.</p>

    
    <div class="team">
      <div class="member">
        <img src="/Avatar Bear.jpg" alt="Photo membre 1">
        <h3>NGUEMA ONDO Franyck</h3>
        <p>Gérent de la boutique </p>
      </div>
      <div class="member">
        <img src="/Gumball (1).jpg" alt="Photo membre 2">
        <h3>Ben Dhan</h3>
        <p>Investisseur et grand frère du gérent</p>
      </div>
      <div class="member">
        <img src="/Gumball.jpg" alt="Photo membre 3">
        <h3>Patrick</h3>
        <p>Propriétaire</p>
      </div>
    </div>
  </section>

</body>
</html>
